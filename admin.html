<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Internship Task</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="profile.html">InternSystem <span class="badge bg-danger">Admin</span></a>
            <div class="ms-auto">
                <a href="profile.html" class="btn btn-outline-light btn-sm">My Profile</a>
            </div>
        </div>
    </nav>

    <div class="container-fluid px-4">
        <div class="card shadow-lg p-4 mb-5" style="border-radius: 15px;">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="text-primary m-0">Database Overview</h2>
                <button id="refreshBtn" class="btn btn-secondary btn-sm">Refresh Data</button>
            </div>
            
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead class="table-dark">
                        <tr>
                            <th>ID</th>
                            <th>Name (MySQL)</th>
                            <th>Email (MySQL)</th>
                            <th>Password (MySQL Hash)</th>
                            <th>Age (Mongo)</th>
                            <th>DOB (Mongo)</th>
                            <th>Contact (Mongo)</th>
                            <th>Address (Mongo)</th>
                            <th>Created (MySQL)</th>
                        </tr>
                    </thead>
                    <tbody id="adminTableBody">
                        <tr>
                            <td colspan="8" class="text-center">Loading data...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- JQuery and AJAX -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
